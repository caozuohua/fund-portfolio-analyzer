name: Fund Portfolio Weekly Analysis
'on':
  schedule:
  - cron: 0 1 * * 1
  workflow_dispatch: null
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip
    - name: Install dependencies
      run: pip install --quiet akshare pandas numpy requests markdown
    - name: Run portfolio analysis
      id: analysis
      run: python scripts/analyze.py 2>&1
      continue-on-error: true
    - name: AI Analysis via Gemini
      id: gemini
      run: python3 scripts/ai_analyze.py
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
      continue-on-error: true
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: report-${{ github.run_number }}
        path: output/
        retention-days: 90
      continue-on-error: true
