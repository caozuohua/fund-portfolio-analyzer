name: Fund Portfolio Weekly Analysis

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:
    inputs:
      name:
        description: 'trigger'
        required: false
        default: 'manual'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet akshare pandas numpy requests markdown 2>&1 | tail -3

      - name: Run portfolio analysis
        id: analysis
        run: python scripts/analyze.py 2>&1
        continue-on-error: true

      - name: Get report content
        id: report
        run: |
          REPORT_FILE=$(ls -t output/report_*.md 2>/dev/null | head -1)
          if [ -n "$REPORT_FILE" ]; then
            echo "file=$REPORT_FILE" >> $GITHUB_OUTPUT
            echo "has_report=true" >> $GITHUB_OUTPUT
            echo "content<<REPORT_EOF" >> $GITHUB_OUTPUT
            cat "$REPORT_FILE" >> $GITHUB_OUTPUT
            echo "REPORT_EOF" >> $GITHUB_OUTPUT
          else
            echo "has_report=false" >> $GITHUB_OUTPUT
          fi

      - name: AI Analysis via Gemini
        id: gemini
        if: steps.report.outputs.has_report == 'true'
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          REPORT="${{ steps.report.outputs.content }}"
          PROMPT="You are a conservative Chinese investment advisor. Simplified Chinese only.
Principles:
- Conservative: max drawdown <10%
- Target allocation: Cash 35% / Bonds 35% / Equity 25% / QDII 5%
- Give per-fund action: increase/decrease/hold
- Flag asset classes deviating >3% from target
- Under 500 Chinese characters, bullet points, no tables

Report:
${REPORT}"
          ESC=$(python3 -c "import json,sys;print(json.dumps(sys.stdin.read()))" <<< "$PROMPT")
          RESP=$(curl -s --max-time 30 -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "{\"contents\":[{\"parts\":[{\"text\":${ESCAPED}}]}],\"generationConfig\":{\"temperature\":0.3,\"maxOutputTokens\":2048}}")
          RESULT=$(echo "$RESP" | python3 -c "
import sys,json
try:
    print(json.load(sys.stdin)['candidates'][0]['content']['parts'][0]['text'])
except Exception as e:
    print('ERR:'+str(e))
" 2>&1)
          if [[ ! "$RESULT" == ERR:* ]] && [ -n "$RESULT" ]; then
            echo "$RESULT" > /tmp/ai_result.md
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: AI Analysis via Groq (fallback)
        id: groq
        if: steps.gemini.outputs.ok != 'true' && steps.report.outputs.has_report == 'true'
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          REPORT="${{ steps.report.outputs.content }}"
          PROMPT="You are a conservative Chinese investment advisor. Simplified Chinese only.
Principles:
- Conservative: max drawdown <10%
- Target allocation: Cash 35% / Bonds 35% / Equity 25% / QDII 5%
- Give per-fund action: increase/decrease/hold
- Flag asset classes deviating >3% from target
- Under 500 Chinese characters, bullet points, no tables

Report:
${REPORT}"
          ESCP=$(python3 -c "import json,sys;print(json.dumps(sys.stdin.read()))" <<< "$PROMPT")
          RESP=$(curl -s --max-time 30 -X POST \
            "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer *** \
            -H 'Content-Type: application/json' \
            -d "{\"model\":\"llama-3.3-70b-versatile\",\"messages\":[{\"role\":\"user\",\"content\":${ESCP}}],\"temperature\":0.3,\"max_tokens\":2048}")
          RESULT=$(echo "$RESP" | python3 -c "
import sys,json
try:
    print(json.load(sys.stdin)['choices'][0]['message']['content'])
except Exception as e:
    print('ERR:'+str(e))
" 2>&1)
          if [[ ! "$RESULT" == ERR:* ]] && [ -n "$RESULT" ]; then
            echo "$RESULT" > /tmp/ai_result.md
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Use raw report if AI failed
        if: steps.groq.outputs.ok != 'true' && steps.gemini.outputs.ok != 'true'
        run: |
          cp "${{ steps.report.outputs.file }}" /tmp/ai_result.md 2>/dev/null || echo "No report available" > /tmp/ai_result.md

      - name: Send email
        if: steps.report.outputs.has_report == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Fund Weekly Report - $(date +%Y-%m-%d)"
          to: ${{ secrets.GMAIL_RECIPIENT }}
          from: "Portfolio Analyzer <${{ secrets.GMAIL_USERNAME }}>"
          body: ${{ steps.report.outputs.content }}
          convert_markdown: true

      - name: Upload artifacts
        if: steps.report.outputs.has_report == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.run_number }}
          path: output/
          retention-days: 90

      - name: Commit report back to repo
        if: steps.report.outputs.has_report == 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "weekly report $(date +%Y-%m-%d)"
          git push origin main --quiet 2>/dev/null || true
