name: 基金持仓周报分析

on:
  schedule:
    # 每周一北京时间 9:00 (UTC 01:00)
    - cron: '0 1 * * 1'
  workflow_dispatch:  # 允许手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install akshare pandas numpy requests
      
      - name: Run analysis script
        run: python scripts/analyze.py
        continue-on-error: true
      
      - name: Read report
        id: report
        run: |
          REPORT_FILE=$(ls -t output/report_*.md | head -1)
          echo "report_file=$REPORT_FILE" >> $GITHUB_OUTPUT
          echo "report_content<<EOF" >> $GITHUB_OUTPUT
          cat "$REPORT_FILE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: AI Analysis with Gemini
        id: ai_analysis
        uses: google-github-actions/run-gemini-cli@v0.1
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          prompt: |
            你是一位保守型个人投资顾问。以下是基金持仓周报数据。
            
            请基于以下原则生成投资建议：
            1. 保守风格：最大回撤容忍<10%，优先保本
            2. 目标配置：现金35% / 固收35% / 权益25% / QDII 5%
            3. 给出具体到每个基金的操作建议（增持/减持/持有）
            4. 标注风险提示
            
            报告数据：
            ${{ steps.report.report_content }}
            
            输出格式：简体中文，列表形式，不用表格，建议具体可执行。
      
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "基金持仓周报 - $(date +%Y-%m-%d)"
          to: ${{ secrets.GMAIL_RECIPIENT }}
          from: ${{ secrets.GMAIL_USERNAME }}
          html_body: ${{ steps.ai_analysis.outputs.response }}
          convert_markdown: true
      
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: output/
          retention-days: 30
