name: Fund Portfolio Weekly Analysis

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch: {}

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet akshare pandas numpy requests markdown

      - name: Run analysis
        run: python scripts/analyze.py 2>&1

      - name: AI Analysis via Gemini
        id: ai
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -e
          REPORT=$(ls -t output/report_*.md 2>/dev/null | head -1)
          if [ -z "$REPORT" ]; then
            echo "No report generated"
            exit 1
          fi
          REPORT_TEXT=$(cat "$REPORT")
          PROMPT="You are a conservative investment advisor. Analyze this fund portfolio report and give adjustment suggestions in Simplified Chinese.

Principles:
- Conservative: max drawdown tolerance <10%
- Target allocation: Cash 35% / Bonds 35% / Equity 25% / QDII 5%
- Give per-fund action: increase/decrease/hold
- Flag asset classes deviating >3% from target
- Max 500 words, bullet points, no tables

Report:
${REPORT_TEXT}"
          if [ -n "$GEMINI_API_KEY" ]; then
            ESCAPED=$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" <<< "$PROMPT")
            RESP=$(curl -s -X POST               "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}"               -H 'Content-Type: application/json'               -d "{"contents":[{"parts":[{"text":${ESCAPED}}]}],"generationConfig":{"temperature":0.3,"maxOutputTokens":2048}}")
            RESULT=$(echo "$RESP" | python3 -c "
import sys,json
try:
    d=json.load(sys.stdin)
    print(d['candidates'][0]['content']['parts'][0]['text'])
except Exception as e:
    print('GEMINI_ERROR:'+str(e))
" 2>&1)
            if [[ ! "$RESULT" == GEMINI_ERROR:* ]] && [ -n "$RESULT" ]; then
              echo "$RESULT" > /tmp/ai_result.md
              echo "backend=gemini" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          if [ -n "$GROQ_API_KEY" ]; then
            ESCAPED=$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" <<< "$PROMPT")
            RESP=$(curl -s -X POST               "https://api.groq.com/openai/v1/chat/completions"               -H "Authorization: Bearer ***               -H 'Content-Type: application/json'               -d "{"model":"llama-3.3-70b-versatile","messages":[{"role":"user","content":${ESCAPED}}],"temperature":0.3,"max_tokens":2048}")
            RESULT=$(echo "$RESP" | python3 -c "
import sys,json
try:
    d=json.load(sys.stdin)
    print(d['choices'][0]['message']['content'])
except Exception as e:
    print('GROQ_ERROR:'+str(e))
" 2>&1)
            if [[ ! "$RESULT" == GROQ_ERROR:* ]] && [ -n "$RESULT" ]; then
              echo "$RESULT" > /tmp/ai_result.md
              echo "backend=groq" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "$REPORT_TEXT" > /tmp/ai_result.md
          echo "backend=none" >> $GITHUB_OUTPUT

      - name: Send email
        if: steps.ai.outputs.backend != ''
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Fund Weekly Report - $(date +%Y-%m-%d)"
          to: ${{ secrets.GMAIL_RECIPIENT }}
          from: "Portfolio Analyzer <${{ secrets.GMAIL_USERNAME }}>"
          body: ${{ steps.ai.outputs.result }}
          convert_markdown: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.run_number }}
          path: output/
          retention-days: 90
